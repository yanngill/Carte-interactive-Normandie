<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Carte interactive du Débarquement américain en Normandie</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <main class="map-wrapper">
      <!-- Bouton d’ouverture de la légende -->
      <div class="legend-toggle-wrap">
        <button id="openLegendBtn" type="button" class="legend-toggle-btn">
          Légende
        </button>
      </div>

      <!-- Panneau de légende -->
      <aside class="legend-sidebar" id="legendSidebar" aria-label="Légende et filtres">
        <div class="legend-header-row">
          <div class="legend-header">
            <h1>Débarquement américain</h1>
            <p>Carte interactive historique et touristique</p>
          </div>

          <button id="closeLegendBtn" type="button" class="legend-close-btn" aria-label="Fermer la légende">
            ✕
          </button>
        </div>

        <div class="legend-actions">
          <button id="showAllBtn" type="button" class="control-btn compact-btn">
            Tout afficher
          </button>
          <button id="hideAllBtn" type="button" class="control-btn compact-btn">
            Tout masquer
          </button>
        </div>

        <div class="legend-panel" id="legendPanel">
          <h2>Catégories</h2>
          <p class="legend-help">
            Clique sur une catégorie pour l’activer ou la désactiver.
            Double-clic sur une catégorie pour n’afficher qu’elle.
          </p>

          <ul class="legend-list" id="legendList"></ul>
        </div>

        <div class="legend-footer">
          <p>
            Fonds de carte : OpenStreetMap / Esri World Imagery<br />
            Carte réalisée avec Leaflet.
          </p>
        </div>
      </aside>

      <div id="map" aria-label="Carte interactive"></div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="script.js"></script>
</body>
</html>
